<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>円形ブロック崩し</title>
  <style>
    body {
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }
    canvas {
      background: #000;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <h2>円形ブロック崩し（試作）</h2>
  <p>操作：マウス移動 または ← → キー / 残機は10、自機に当たるとミス</p>
  <canvas id="game" width="600" height="600"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;

    // 円形フィールド
    const fieldRadius = 250;

    // 自機（パドル）
    let paddleAngle = -Math.PI / 2; // 上からスタート
    const paddleWidthAngle = Math.PI / 16; // パドルの角度幅
    const paddleRadius = fieldRadius + 10;

    // 玉
    let ball = {
      x: cx,
      y: cy,
      vx: 3,
      vy: -3,
      r: 8
    };

    // ブロック
    const blocks = [];
    const blockCount = 32; // 円周上に並べる数
    const blockRadius = fieldRadius - 20;
    const blockSize = 18;

    for (let i = 0; i < blockCount; i++) {
      const angle = (i / blockCount) * Math.PI * 2;
      const bx = cx + Math.cos(angle) * blockRadius;
      const by = cy + Math.sin(angle) * blockRadius;
      blocks.push({
        x: bx,
        y: by,
        angle,
        alive: true
      });
    }

    // 残機
    let lives = 10;
    let gameOver = false;

    // 入力
    const keys = { left: false, right: false };

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") keys.left = true;
      if (e.key === "ArrowRight") keys.right = true;
    });
    window.addEventListener("keyup", e => {
      if (e.key === "ArrowLeft") keys.left = false;
      if (e.key === "ArrowRight") keys.right = false;
    });

    // マウスで角度指定
    canvas.addEventListener("mousemove", e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const dx = mx - cx;
      const dy = my - cy;
      paddleAngle = Math.atan2(dy, dx);
    });

    function update() {
      if (gameOver) return;

      // パドル移動（キーボード）
      const paddleSpeed = 0.05;
      if (keys.left) paddleAngle -= paddleSpeed;
      if (keys.right) paddleAngle += paddleSpeed;

      // 玉の移動
      ball.x += ball.vx;
      ball.y += ball.vy;

      // フィールド外周で反射（円）
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = fieldRadius - ball.r;

      if (dist > maxDist) {
        // 法線ベクトル
        const nx = dx / dist;
        const ny = dy / dist;
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;

        // 外に出すぎないように補正
        const corr = maxDist / dist;
        ball.x = cx + dx * corr;
        ball.y = cy + dy * corr;
      }

      // ブロックとの当たり判定（円形近似）
      for (const b of blocks) {
        if (!b.alive) continue;
        const bdx = ball.x - b.x;
        const bdy = ball.y - b.y;
        const d2 = bdx * bdx + bdy * bdy;
        const hitDist = ball.r + blockSize / 2;
        if (d2 < hitDist * hitDist) {
          b.alive = false;
          // 反射（ブロック中心からの法線）
          const d = Math.sqrt(d2) || 1;
          const nx = bdx / d;
          const ny = bdy / d;
          const dot = ball.vx * nx + ball.vy * ny;
          ball.vx -= 2 * dot * nx;
          ball.vy -= 2 * dot * ny;
          break;
        }
      }

      // 自機との当たり判定
      const pdx = ball.x - cx;
      const pdy = ball.y - cy;
      const ballAngle = Math.atan2(pdy, pdx);
      let diff = ballAngle - paddleAngle;
      // -π〜πに正規化
      diff = (diff + Math.PI) % (Math.PI * 2) - Math.PI;

      const ballDist = Math.sqrt(pdx * pdx + pdy * pdy);
      const paddleDist = paddleRadius;
      const radialDiff = Math.abs(ballDist - paddleDist);

      if (Math.abs(diff) < paddleWidthAngle && radialDiff < 15) {
        // ミス：自機に当たった
        lives--;
        if (lives <= 0) {
          gameOver = true;
        }

        // 玉を自機から弾き返す（自機の角度方向と逆向き）
        const dirAngle = paddleAngle + Math.PI; // 自機から外側へ
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy) || 4;
        ball.vx = Math.cos(dirAngle) * speed;
        ball.vy = Math.sin(dirAngle) * speed;

        // 少し外側に押し出す
        ball.x = cx + Math.cos(dirAngle) * (paddleDist - 20);
        ball.y = cy + Math.sin(dirAngle) * (paddleDist - 20);
      }
    }

    function drawField() {
      // フィールド円
      ctx.strokeStyle = "#444";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, fieldRadius, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawBlocks() {
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.fillStyle = "#4af";
        ctx.fillRect(-blockSize / 2, -blockSize / 2, blockSize, blockSize);
        ctx.restore();
      }
    }

    function drawPaddle() {
      ctx.strokeStyle = "#fa4";
      ctx.lineWidth = 10;
      ctx.beginPath();
      ctx.arc(
        cx,
        cy,
        paddleRadius,
        paddleAngle - paddleWidthAngle,
        paddleAngle + paddleWidthAngle
      );
      ctx.stroke();
    }

    function drawBall() {
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawUI() {
      ctx.fillStyle = "#fff";
      ctx.font = "16px sans-serif";
      ctx.fillText("残機: " + lives, 10, 20);

      if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, H / 2 - 40, W, 80);
        ctx.fillStyle = "#f44";
        ctx.font = "32px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", W / 2, H / 2);
        ctx.textAlign = "left";
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      update();
      drawField();
      drawBlocks();
      drawPaddle();
      drawBall();
      drawUI();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
